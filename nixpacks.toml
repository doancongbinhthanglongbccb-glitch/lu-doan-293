# Fallback if not using Dockerfile — monorepo: install deps inside backend/
# Docs: https://docs.sevalla.com/applications/build-options/nixpacks

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["cd backend && npm ci --omit=dev"]

[phases.build]
cmds = ["cd backend && node database/migrate.js"]

[start]
cmd = "cd backend && node src/index.js"
