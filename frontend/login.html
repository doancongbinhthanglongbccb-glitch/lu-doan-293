<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page" data-auth-page="login">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/logo.png" alt="Logo" class="login-logo">
                <h1>Hệ thống ôn tập trắc nghiệm</h1>
                <p>ĐOÀN CÔNG BINH THĂNG LONG</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="militaryId">Số quân nhân</label>
                    <input type="text" id="militaryId" maxlength="8" pattern="\d{8}" inputmode="numeric" placeholder="8 chữ số" required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="••••••" required autocomplete="current-password">
                </div>
                <div id="loginError" class="login-error" style="display:none;"></div>
                <button type="submit" class="btn-large btn-orange login-btn">ĐĂNG NHẬP</button>
            </form>
            <p class="login-footer-link">Chưa có tài khoản? <a href="/register">Đăng ký</a></p>
        </div>
    </div>

    <script type="module" src="js/entries/auth-app.js"></script>
</body>
</html>
