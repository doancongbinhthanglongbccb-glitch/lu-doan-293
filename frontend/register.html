<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="login-page" data-auth-page="register">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/logo.png" alt="Logo" class="login-logo">
                <h1>Đăng ký tài khoản</h1>
                <p>ĐOÀN CÔNG BINH THĂNG LONG</p>
            </div>
            <form id="registerForm" class="login-form">
                <div class="input-group">
                    <label for="militaryId">Số quân nhân <span class="req">*</span></label>
                    <input type="text" id="militaryId" maxlength="8" pattern="\d{8}" inputmode="numeric" placeholder="8 chữ số, vd: 12345678" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="fullName">Họ và tên <span class="req">*</span></label>
                    <input type="text" id="fullName" placeholder="Nguyễn Văn A" required autocomplete="name">
                </div>
                <div class="input-group">
                    <label for="password">Mật khẩu <span class="req">*</span></label>
                    <input type="password" id="password" placeholder="Tối thiểu 4 ký tự" required autocomplete="new-password">
                </div>
                <div class="input-group">
                    <label for="passwordConfirm">Xác nhận mật khẩu <span class="req">*</span></label>
                    <input type="password" id="passwordConfirm" placeholder="Nhập lại mật khẩu" required autocomplete="new-password">
                </div>
                <div id="registerError" class="login-error" style="display:none;"></div>
                <div id="registerSuccess" class="login-success" style="display:none;"></div>
                <button type="submit" class="btn-large btn-orange login-btn">GỬI YÊU CẦU ĐĂNG KÝ</button>
            </form>
            <p class="login-footer-link">Đã có tài khoản? <a href="/login">Đăng nhập</a></p>
        </div>
    </div>

    <script type="module" src="js/entries/auth-app.js"></script>
</body>
</html>
